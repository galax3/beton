services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3891:80"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:80 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
